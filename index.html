<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question for You...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            text-align: center;
            position: relative;
            color: rgba(255,255,255,0.95);
            overflow: hidden;

            /* Fallback background if gradients/images don't load */
            background: radial-gradient(circle at 20% 10%, #ffe6f3, #ffd6e7 35%, #f7c8ff 70%, #d9f6ff);
        }

        /* Sweet/cute blended collage background (pink soft, no heavy gradients) */
        body::before {
            content: "";
            position: absolute;
            inset: -40px;
            z-index: -2;
            background-image:
                url("WhatsApp Image 2026-07-16 at 04.47.44.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.47.50.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.47.57.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.02.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.05.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.07.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.13.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.16.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.17.jpeg"),
                url("WhatsApp Image 2026-07-16 at 04.48.18.jpeg");
            background-size: cover, cover, cover, cover, cover, cover, cover, cover, cover, cover;
            background-position:
                20% 20%,
                80% 30%,
                30% 70%,
                70% 80%,
                15% 85%,
                85% 15%,
                45% 55%,
                65% 35%,
                25% 45%,
                55% 65%;
            background-repeat: no-repeat;
            filter: blur(12px) saturate(1.15) contrast(1.02);
            transform: scale(1.10);
            opacity: 0.72;
        }

        /* Pink tint overlay for softness */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 25% 15%, rgba(255,180,210,0.45), transparent 50%),
                radial-gradient(circle at 80% 65%, rgba(255,210,235,0.35), transparent 55%),
                rgba(255, 214, 231, 0.18);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.30);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 22px;
            box-shadow:
                0 22px 70px rgba(0,0,0,0.25),
                0 0 0 1px rgba(255,255,255,0.10) inset;
        }

        #main-card p, #success-message p {
            color: rgba(255,255,255,0.92);
            font-size: 1.1rem;
            margin: 10px 0 0;
        }

        h1 {
            color: #ff7ab6;
            text-shadow: 0 6px 18px rgba(255, 90, 165, 0.22);
            margin-top: 0;
        }

        #cat-meme {
            width: 250px;
            border-radius: 18px;
            margin-bottom: 20px;
            transform: translateZ(0);
        }

        @media (max-width: 520px) {
            .container {
                width: 86vw;
                padding: 26px;
            }
            #cat-meme { width: 210px; }
            button { font-size: 1.05rem; }
        }

        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            font-family: inherit;
            letter-spacing: 0.2px;
        }

        button:active {
            transform: translateY(1px) scale(0.99);
        }

        #yesBtn:hover {
            filter: brightness(1.05) saturate(1.05);
            transform: translateY(-2px);
        }

        #noBtn:hover {
            filter: brightness(1.06);
            transform: translateY(-2px);
        }

        #yesBtn {
            background: rgba(255, 122, 182, 0.95);
            color: white;
            box-shadow: 0 12px 30px rgba(255,90,165,0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        #noBtn {
            background: rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.95);
            border: 1px solid rgba(255,255,255,0.38);
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.10);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #success-message {
            display: none;
        }

        .container img#cat-meme {
            box-shadow: 0 18px 60px rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.20);
            background: rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <img id="cat-meme" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eHRqZ2Z5Y293Ym9wYmF3Ym9wYmF3Ym9wYmF3Ym9wYmF3Ym8mZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/MDJ9IbxxvDUQM/giphy.gif" alt="Cute Cat">
        <h1 id="question">Do you love me?</h1>
        
        <div class="buttons" id="btnContainer">
            <button id="yesBtn" onclick="showLove()">Yes!</button>
            <button id="noBtn" onmouseover="moveNoButton()">No</button>
        </div>
    </div>

    <div class="container" id="success-message">
        <img id="cat-meme" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHp1eHRqZ2Z5Y293Ym9wYmF3Ym9wYmF3Ym9wYmF3Ym9wYmF3Ym8mZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/KztT2c4u8mYYUiMKdJ/giphy.gif" alt="Happy Cat">
        <h1>I knew it! ❤️</h1>
        <p>I love you too!</p>
    </div>

    <script>
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function showLove() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }
    </script>
</body>
</html>
